<!-- feedback.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deutsch Atelier — Отзывы</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body data-page="feedback">
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html">
        <span class="brand-mark">DE</span>
        <span class="brand-text">Deutsch Atelier</span>
      </a>

      <nav class="main-nav">
        <a href="index.html" data-i18n="nav_home">Главная</a>
        <a href="levels.html" data-i18n="nav_levels">Уровни</a>
        <a href="lesson.html?id=b1-01" data-i18n="nav_lesson">Урок</a>
        <a href="feedback.html" data-i18n="nav_feedback">Отзывы</a>
        <a href="reviews.html" data-i18n="nav_reviews">Отзывы пользователей</a>
        <a href="about.html" data-i18n="nav_about">О проекте</a>
        <a href="contact.html" data-i18n="nav_contact">Контакты</a>
      </nav>

      <div class="header-tools">
        <select id="languageSwitcher" class="language-switcher" aria-label="Language switcher">
          <option value="ru">RU</option>
          <option value="uk">UA</option>
          <option value="en">EN</option>
          <option value="es">ES</option>
        </select>
      </div>
    </div>
  </header>

  <main class="container section">
    <div class="section-head">
      <h1 data-i18n="feedback_title">Оставить отзыв</h1>
      <p data-i18n="feedback_text">Оцените сайт и оставьте комментарий. Отзыв можно отправить на email и сохранить локально.</p>
    </div>

    <section class="card feedback-card">
    <form id="form" class="feedback-form">
      <input type="hidden" name="access_key" value="fb19764d-80bc-4713-aafa-88a4dfb7ec69" />

      <div class="form-group">
        <label for="name">Your name</label>
        <input
          id="name"
          name="name"
          type="text"
          class="text-input"
          placeholder="Name or nickname"
        />
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          name="email"
          type="email"
          class="text-input"
          placeholder="name@example.com"
        />
      </div>

      <div class="form-group">
        <label for="message">Comment</label>
        <textarea
          id="message"
          name="message"
          rows="6"
          class="text-input"
          placeholder="Write your review..."
          required
        ></textarea>
      </div>

      <button type="submit" class="btn">Send by email</button>
      <div id="feedbackStatus" class="player-status"></div>
    </form>
  </section>

  </main>

  <footer class="site-footer container">
    <p data-i18n="footer_text">Deutsch Atelier · открытый сайт для изучения немецкого.</p>
  </footer>

  <script src="assets/js/app.js"></script>
  <script src="assets/js/feedback.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', () => {
    const form = document.getElementById('form');
    const statusBox = document.getElementById('feedbackStatus');

    if (!form || !statusBox) return;

    const submitBtn = form.querySelector('button[type="submit"]');
    if (!submitBtn) return;

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const formData = new FormData(form);
      const originalText = submitBtn.textContent;

      submitBtn.textContent = 'Sending...';
      submitBtn.disabled = true;
      statusBox.textContent = 'Отправка...';

      try {
        const response = await fetch('https://api.web3forms.com/submit', {
          method: 'POST',
          body: formData
        });

        const data = await response.json();

        if (response.ok && data.success) {
          statusBox.textContent = 'Спасибо! Ваше сообщение отправлено.';
          form.reset();
        } else {
          statusBox.textContent = 'Ошибка: ' + (data.message || 'не удалось отправить сообщение');
        }
      } catch (error) {
        console.error(error);
        statusBox.textContent = 'Что-то пошло не так. Попробуйте ещё раз.';
      } finally {
        submitBtn.textContent = originalText;
        submitBtn.disabled = false;
      }
    });
  });
</script>



</body>
</html>
