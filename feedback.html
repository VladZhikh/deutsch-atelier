<!-- feedback.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deutsch Atelier — Отзывы</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body data-page="feedback">
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html">
        <span class="brand-mark">DE</span>
        <span class="brand-text">Deutsch Atelier</span>
      </a>

      <nav class="main-nav">
        <a href="index.html" data-i18n="nav_home">Главная</a>
        <a href="levels.html" data-i18n="nav_levels">Уровни</a>
        <a href="lesson.html?id=b1-01" data-i18n="nav_lesson">Урок</a>
        <a href="feedback.html" data-i18n="nav_feedback">Отзывы</a>
        <a href="reviews.html" data-i18n="nav_reviews">Отзывы пользователей</a>
        <a href="about.html" data-i18n="nav_about">О проекте</a>
        <a href="contact.html" data-i18n="nav_contact">Контакты</a>
      </nav>

      <div class="header-tools">
        <select id="languageSwitcher" class="language-switcher" aria-label="Language switcher">
          <option value="ru">RU</option>
          <option value="uk">UA</option>
          <option value="en">EN</option>
          <option value="es">ES</option>
        </select>
      </div>
    </div>
  </header>

  <main class="container section">
    <div class="section-head">
      <h1 data-i18n="feedback_title">Оставить отзыв</h1>
      <p data-i18n="feedback_text">Оцените сайт и оставьте комментарий. Отзыв можно отправить на email и сохранить локально.</p>
    </div>

    <section class="form-panel">
      <form id="feedbackForm" class="feedback-form">
        <label>
          <span data-i18n="feedback_name">Имя или псевдоним</span>
          <input type="text" id="feedbackName" />
        </label>

        <label>
          <span data-i18n="feedback_language">Язык интерфейса</span>
          <select id="feedbackLanguage">
            <option value="ru">RU</option>
            <option value="uk">UA</option>
            <option value="en">EN</option>
            <option value="es">ES</option>
          </select>
        </label>

        <label>
          <span data-i18n="feedback_rating">Оценка</span>
          <div class="star-rating" id="starRating"></div>
        </label>

        <label>
          <span data-i18n="feedback_comment">Комментарий</span>
          <textarea id="feedbackComment" rows="6"></textarea>
        </label>

        <label class="checkbox-row">
          <input type="checkbox" id="publishConsent" />
          <span data-i18n="feedback_consent">Разрешаю публикацию отзыва на сайте после модерации</span>
        </label>

        <div class="panel-actions">
          <button type="submit" class="btn btn-primary" data-i18n="feedback_send">Отправить на email</button>
          <button type="button" class="btn btn-secondary" id="saveDraftBtn" data-i18n="feedback_save_draft">Сохранить черновик</button>
        </div>

        <p id="feedbackStatus" class="status-line"></p>
      </form>
    </section>
  </main>

  <footer class="site-footer container">
    <p data-i18n="footer_text">Deutsch Atelier · открытый сайт для изучения немецкого.</p>
  </footer>

  <script src="assets/js/app.js"></script>
  <script src="assets/js/feedback.js"></script>
</body>
</html>
